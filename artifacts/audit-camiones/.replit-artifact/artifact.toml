kind = "web"
previewPath = "/"
title = "Sistema de Auditoría de Camiones"
version = "1.0.0"
id = "artifacts/audit-camiones"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18190

[services.development]
run = "pnpm --filter @workspace/audit-camiones run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/audit-camiones", "run", "build" ]
publicDir = "artifacts/audit-camiones/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18190"
BASE_PATH = "/"
